{% extends 'base.html' %}

{% block title %}Профиль | AI Recipe Assistant{% endblock %}

{% block content %}
<div class="profile-card glass-panel">
    <div class="profile-avatar">
        🍳
    </div>
    
    <div class="profile-username">{{ user.username }}</div>
    <div class="profile-email">📧 {{ user.email }}</div>
    
    <div class="profile-stats">
        <div class="stat-item">
            <div class="stat-value">{{ favorites_count }}</div>
            <div class="stat-label">Избранное</div>
        </div>
        <div class="stat-item">
            <div class="stat-value">{{ history_count }}</div>
            <div class="stat-label">Фото запросы</div>
        </div>
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 15px; max-width: 300px; margin: 0 auto;">
        <a href="{% url 'favorites' %}" class="btn btn-outline" style="width: 100%;">⭐ В избранное</a>
        <a href="{% url 'history' %}" class="btn btn-outline" style="width: 100%;">📜 История запросов</a>
        
        <hr style="border: none; border-top: 1px solid var(--glass-border); margin: 10px 0;">
        
        <a href="{% url 'logout' %}" class="btn btn-danger" style="width: 100%;">🚪 Выйти из системы</a>
    </div>
</div>

<script>
    document.getElementById('nav-profile').classList.add('active');
</script>
{% endblock %}
