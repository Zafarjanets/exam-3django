{% extends 'base.html' %}
 
{% block title %}Профиль | AI Recipe Assistant{% endblock %}
 
{% block content %}
<div class="profile-card glass-panel reveal">
    <div class="profile-avatar">
        <span class="icon-bounce">🍳</span>
        <span class="profile-avatar-ring"></span>
    </div>
 
    <div class="profile-username gradient-title" style="font-size: 28px;">{{ user.username }}</div>
    <div class="profile-email">📧 {{ user.email }}</div>
 
    <div class="profile-stats">
        <div class="stat-item">
            <div class="stat-value" data-count="{{ favorites_count }}">0</div>
            <div class="stat-label">❤️ Избранное</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" data-count="{{ history_count }}">0</div>
            <div class="stat-label">📜 Запросы</div>
        </div>
    </div>
 
    <div class="profile-actions">
        <a href="{% url 'favorites' %}" class="btn btn-primary btn-glow">⭐ В избранное</a>
        <a href="{% url 'history' %}" class="btn btn-outline">📜 История</a>
        <a href="{% url 'logout' %}" class="btn btn-danger">🚪 Выйти</a>
    </div>
</div>
{% endblock %}
 
{% block extra_js %}
<script>
(function () {
    function animateCounters() {
        document.querySelectorAll(".stat-value[data-count]").forEach((node) => {
            const target = parseInt(node.dataset.count, 10) || 0;
            const duration = 700;
            const start = performance.now();
            function tick(now) {
                const progress = Math.min((now - start) / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                node.textContent = Math.round(eased * target);
                if (progress < 1) requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        });
    }
 
    document.addEventListener("DOMContentLoaded", () => {
        animateCounters();
        const link = document.getElementById("nav-profile");
        if (link) link.classList.add("active");
    });
})();
</script>
{% endblock %}
