{% extends "base.html" %}
 
{% block title %}Поиск по ингредиентам | AI Recipe Assistant{% endblock %}
 
{% block content %}
<section class="page-hero reveal">
    <span class="page-hero-icon icon-bounce">✍️</span>
    <h1 class="gradient-title">Поиск по ингредиентам</h1>
    <p>Введите продукты — ИИ предложит несколько красивых вариантов блюд</p>
</section>
 
<div class="form-card glass-panel reveal">
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
 
    <form method="POST" id="search-form">
        {% csrf_token %}
        <div class="form-group">
            <label for="ingredients"><span class="label-icon">🥕</span> Ингредиенты (через запятую)</label>
            <textarea id="ingredients" name="ingredients" rows="4" placeholder="Например: яйца, хлеб, помидор, сыр" required>{% if request.POST.ingredients %}{{ request.POST.ingredients }}{% endif %}</textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-glow" style="width: 100%;" id="submit-btn">
            <span class="btn-icon icon-bounce">🍳</span>
            <span>Получить варианты блюд</span>
        </button>
    </form>
</div>
