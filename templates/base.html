{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Recipe Assistant{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>

<div class="navbar">
    <a href="/" class="logo">
        🍳 <span>AI Recipe</span>
    </a>

    <div class="menu">
        <a href="/" id="nav-home">🏠 Главная</a>
        {% if user.is_authenticated %}
            <a href="{% url 'recipe_search' %}" id="nav-search">✍️ Ингредиенты</a>
            <a href="{% url 'image_search' %}" id="nav-image">📸 По фото</a>
            <a href="{% url 'favorites' %}" id="nav-favorites">⭐ Избранное</a>
            <a href="{% url 'history' %}" id="nav-history">📜 История</a>
            <a href="{% url 'profile' %}" id="nav-profile" class="btn-nav-accent">👤 {{ user.username }}</a>
        {% else %}
            <a href="{% url 'login' %}" id="nav-login" class="btn-nav-accent">🔑 Войти</a>
        {% endif %}
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
