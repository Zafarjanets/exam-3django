<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Recipe</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #111827;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
            color: #38bdf8;
        }

        .menu {
            display: flex;
            gap: 20px;
        }

        .menu a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
            transition: 0.3s;
        }

        .menu a:hover {
            background: #38bdf8;
            color: black;
        }

        .container {
            padding: 30px;
        }
    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">🍳 AI Recipe</div>

    <div class="menu">
        <a href="/">Home</a>
        <a href="/search/">Recipe</a>
        <a href="/image/">Photo</a>
        <a href="/favorites/">Favorites</a>
        <a href="/history/">History</a>
        <a href="/profile/">Profile</a>
    </div>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
