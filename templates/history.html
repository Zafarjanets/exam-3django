{% extends "base.html" %}
 
{% block title %}История запросов | AI Recipe Assistant{% endblock %}
 
{% block content %}
<h2 class="history-page-title">📜 История ваших AI запросов</h2>
 
{% if items %}
    <div class="history-timeline">
        {% for item in items %}
            <div class="history-card glass-panel">
                <div class="history-img-wrapper">
                    {% if item.image %}
                        <img src="{{ item.image.url }}" alt="Запрос от {{ item.created_at }}">
                    {% else %}
                        <div class="history-empty-icon-fallback">📝</div>
                    {% endif %}
                </div>
