<h1>💬 Food AI History</h1>

{% for item in items %}
    <div style="border:1px solid #ccc; padding:15px; margin:10px;">

        <img src="{{ item.image.url }}" width="150">

        <p><b>Detected:</b> {{ item.detected_ingredients }}</p>

        <p><b>AI response:</b></p>
        <pre>{{ item.ai_response }}</pre>

        <small>{{ item.created_at }}</small>

    </div>
{% empty %}
    <p>No history yet</p>
{% endfor %}
