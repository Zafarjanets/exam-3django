{% load static  %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
        <link rel="stylesheet" href="{% static 'style.css' %}">

</head>
<body>

    <div class="auth-container">
        <h2>Регистрация</h2>
        <p class="subtitle">Создайте новый аккаунт за пару шагов</p>

        <form action="" method="POST">
             {% csrf_token %}
            <div class="form-group">
                <label for="reg-username">Имя пользователя</label>
                <input type="text" id="reg-username" name="username" placeholder="Username" required>
            </div>

            <div class="form-group">
                <label for="email">Электронная почта</label>
                <input type="email" id="email" name="email" placeholder="example@mail.com" required>
            </div>

            <div class="form-group">
                <label for="reg-password">Пароль</label>
                <input type="password" id="reg-password" name="password1" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Подвердите пароль</label>
                <input type="password" id="reg-password" name="password2" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Продолжить</button>
        </form>

        <div class="auth-footer">
            Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
        </div>
    </div>

</body>
</html>
