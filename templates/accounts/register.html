{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация | AI Recipe Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <div class="auth-page-wrapper">
        <div class="auth-container">
            <div style="text-align: center; margin-bottom: 15px; font-size: 32px;">🍳</div>
            <h2>Регистрация</h2>
            <p class="subtitle">Создайте новый аккаунт за пару шагов</p>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form action="" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="reg-username">Имя пользователя</label>
                    <input type="text" id="reg-username" name="username" placeholder="Username" required value="{% if request.POST.username %}{{ request.POST.username }}{% endif %}">
                </div>

                <div class="form-group">
                    <label for="email">Электронная почта</label>
                    <input type="email" id="email" name="email" placeholder="example@mail.com" required value="{% if request.POST.email %}{{ request.POST.email }}{% endif %}">
                </div>

                <div class="form-group">
                    <label for="reg-password-1">Пароль</label>
                    <input type="password" id="reg-password-1" name="password1" placeholder="••••••••" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-password-2">Подтвердите пароль</label>
                    <input type="password" id="reg-password-2" name="password2" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-submit">Продолжить</button>
            </form>

            <div class="auth-footer">
                Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
            </div>
            
            <div style="text-align: center; margin-top: 25px; font-size: 13px;">
                <a href="/" style="color: var(--text-secondary); text-decoration: none;">← На главную</a>
            </div>
        </div>
    </div>

</body>
</html>
