{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему | AI Recipe Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <div class="auth-page-wrapper">
        <div class="auth-container">
            <div style="text-align: center; margin-bottom: 15px; font-size: 32px;">🍳</div>
            <h2>С возвращением</h2>
            <p class="subtitle">Пожалуйста, войдите в свой аккаунт</p>

            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form action="" method="POST">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Имя пользователя или Email</label>
                    <input type="text" id="username" name="username" placeholder="example_user" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-submit">Войти</button>
            </form>

            <div class="auth-footer">
                Нет аккаунта? <a href="{% url 'register' %}">Создать аккаунт</a>
            </div>
            
            <div style="text-align: center; margin-top: 25px; font-size: 13px;">
                <a href="/" style="color: var(--text-secondary); text-decoration: none;">← На главную</a>
            </div>
        </div>
    </div>

</body>
</html>
