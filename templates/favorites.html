{% extends "base.html" %}
 
{% block title %}Избранное | AI Recipe Assistant{% endblock %}
 
{% block content %}
<h2 class="history-page-title">❤️ Избранные рецепты</h2>
 
{% if favorites %}
    <div class="favorites-grid">
        {% for item in favorites %}
            <div class="fav-card glass-panel">
                <div class="fav-image">
                    {% if item.recipe.image %}
                        <img src="{{ item.recipe.image.url }}" alt="{{ item.recipe.title }}">
                    {% else %}
                        <div class="favorites-empty-fallback">🍲</div>
                    {% endif %}
                </div>
 
                <div class="fav-content">
                    <div>
                        <h3 class="fav-title">{{ item.recipe.title }}</h3>
                        <p class="fav-description">{{ item.recipe.description }}</p>
