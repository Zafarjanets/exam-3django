{% extends "base.html" %}
{% load i18n %}

{% block title %}My Meal Plans - FridgeMaster AI{% endblock %}

{% block page_title %}{% trans "My Meal Plans" %}{% endblock %}

{% block extra_css %}
<style>
    .plans-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    
    .plan-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        overflow: hidden;
    }
    
    .plan-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), #a78bfa);
    }
    
    .plan-card {
        position: relative;
    }
    
    .plan-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 60px rgba(124,58,237,0.2);
        border-color: var(--primary);
    }
    
    .plan-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
    }
    
    .plan-icon {
        font-size: 28px;
    }
    
    .plan-date {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 8px;
    }
    
    .plan-stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin: 16px 0;
        padding: 12px 0;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
    }
    
    .stat-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    
    .stat-label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--text-muted);
    }
    
    .stat-value {
        font-family: 'Poppins', sans-serif;
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
    }
    
    .plan-actions {
        display: flex;
        gap: 8px;
        margin-top: auto;
        padding-top: 16px;
        border-top: 1px solid var(--border);
    }
    
    .action-btn {
        flex: 1;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        background: var(--bg-hover);
        border-radius: var(--radius-md);
        color: var(--text-muted);
        text-decoration: none;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    
    .action-btn:hover {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }
    
    .action-btn.danger:hover {
        background: #ef4444;
        border-color: #ef4444;
    }
    
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-muted);
    }
    
    .empty-icon {
        font-size: 64px;
        margin-bottom: 16px;
    }
