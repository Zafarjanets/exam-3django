{% extends "base.html" %}
{% load i18n %}

{% block title %}My Meal Plans - FridgeMaster AI{% endblock %}

{% block page_title %}{% trans "My Meal Plans" %}{% endblock %}

{% block extra_css %}
<style>
    .plans-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    
    .plan-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 20px;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        cursor: pointer;
        overflow: hidden;
    }
    
    .plan-card::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--primary), #a78bfa);
    }
    
    .plan-card {
        position: relative;
    }
    
    .plan-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 60px rgba(124,58,237,0.2);
        border-color: var(--primary);
    }
    
    .plan-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
    }
