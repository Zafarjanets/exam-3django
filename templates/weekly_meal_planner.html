{% extends "base.html" %}
{% load i18n static meal_filters %}

{% block title %}Weekly Meal Planner - FridgeMaster AI{% endblock %}

{% block page_title %}{% trans "Weekly Meal Planner" %}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'weekly_meal_planner.css' %}">
<style>
    .meal-card {
        background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(16,185,129,0.05));
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 20px;
        margin-bottom: 16px;
        transition: all 0.3s ease;
    }
    
    .meal-card:hover {
        border-color: var(--primary);
        box-shadow: 0 10px 30px rgba(124,58,237,0.15);
        transform: translateY(-2px);
    }
    
    .meal-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
        font-size: 18px;
    }
    
    .meal-icon {
        font-size: 28px;
    }
    
    .meal-title {
        font-family: 'Poppins', sans-serif;
        font-weight: 700;
        font-size: 18px;
        color: var(--text);
    }
    
    .meal-description {
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 12px;
    }
    
    .macro-bars {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 12px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border);
    }
    
    .macro-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
