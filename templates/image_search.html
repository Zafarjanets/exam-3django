{% extends 'base.html' %}
 
{% block title %}Распознавание по фото | AI Recipe Assistant{% endblock %}
 
{% block content %}
<section class="page-hero reveal">
    <span class="page-hero-icon icon-bounce">📸</span>
    <h1 class="gradient-title">Анализ по фото</h1>
    <p>YOLO распознает продукты — AI предложит варианты блюд</p>
</section>
 
<div class="form-card glass-panel reveal">
    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
 
    <form method="POST" enctype="multipart/form-data" id="image-form">
        {% csrf_token %}
        <div class="form-group image-form-center">
            <label for="image-input" class="upload-dropzone" id="dropzone">
                <div class="upload-icon icon-bounce">📸</div>
                <h4>Выберите файл изображения</h4>
                <p id="file-name">JPG, PNG, WEBP</p>
                <input type="file" id="image-input" name="image" accept="image/*" class="visually-hidden-input" required>
            </label>
        </div>
        <button type="submit" class="btn btn-secondary btn-glow full-width-btn" id="submit-btn">
            <span class="btn-icon">🚀</span> Запустить анализ
        </button>
    </form>
</div>
